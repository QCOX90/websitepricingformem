<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Pricing Calculator</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --accent:#0f172a;
      --accent-2:#f1f5f9;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:22px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
      display:grid;
      grid-template-columns:1.3fr .8fr;
      gap:24px;
    }

    .card{
      background:var(--card);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
    }

    .sub{
      color:var(--muted);
      margin:0 0 16px;
    }

    .section{
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      background:#fff;
    }

    .section-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .section h2{
      font-size:20px;
      margin:0;
    }

    .badge{
      background:var(--accent-2);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .option{
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:flex-start;
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      margin-top:10px;
      cursor:pointer;
    }

    .option:hover{
      background:#fbfdff;
    }

    .option-left{
      display:flex;
      gap:12px;
      align-items:flex-start;
      width:100%;
    }

    .option label{
      cursor:pointer;
      display:block;
      width:100%;
    }

    .label-title{
      font-weight:700;
      margin-bottom:4px;
    }

    .label-sub{
      font-size:14px;
      color:var(--muted);
    }

    .summary-sticky{
      position:sticky;
      top:24px;
    }

    .total-box{
      border-radius:22px;
      padding:20px;
      margin-bottom:14px;
    }

    .total-dark{
      background:var(--accent);
      color:#fff;
    }

    .total-light{
      border:1px solid var(--border);
      background:#fff;
    }

    .total-label{
      font-size:14px;
      opacity:.8;
    }

    .total-value{
      font-size:42px;
      font-weight:800;
      margin-top:6px;
    }

    .summary-list{
      border-top:1px solid var(--border);
      margin-top:16px;
      padding-top:16px;
      max-height:320px;
      overflow:auto;
    }

    .summary-item{
      background:#f8fafc;
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:10px;
    }

    .summary-item strong{
      display:block;
      margin-bottom:3px;
    }

    .summary-item span{
      font-size:13px;
      color:var(--muted);
    }

    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    button{
      border:none;
      border-radius:18px;
      padding:14px 16px;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--border);
      color:var(--text);
    }

    .note{
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    @media (max-width: 900px){
      .wrap{
        grid-template-columns:1fr;
      }

      .summary-sticky{
        position:static;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Website Pricing Calculator</h1>
      <p class="sub">Use this during client calls to build a quote live.</p>
      <div id="sections"></div>
    </div>

    <div class="summary-sticky">
      <div class="card">
        <h2 style="margin-top:0;">Price Summary</h2>
        <p class="sub">Use this for one-time or monthly pricing.</p>

        <div class="total-box total-dark">
          <div class="total-label">One-Time Total</div>
          <div class="total-value" id="oneTimeTotal">$0</div>
        </div>

        <div class="total-box total-light">
          <div class="total-label">Monthly Total</div>
          <div class="total-value" id="monthlyTotal">$0/mo</div>
        </div>

        <div class="summary-list" id="summaryList"></div>

        <div class="btn-row">
          <button class="btn-primary" onclick="copySummary()">Copy Summary</button>
          <button class="btn-secondary" onclick="resetSelections()">Reset</button>
        </div>

        <div class="note">
          Start with the one-time price, then offer the monthly option as the easier choice for small businesses.
        </div>
      </div>
    </div>
  </div>

  <script>
    const sections = [
      {
        key: "base",
        title: "1. Base Website",
        type: "single",
        items: [
          { id: "base_1", label: "1–3 pages", oneTime: 300, monthly: 60 },
          { id: "base_2", label: "4–6 pages", oneTime: 450, monthly: 75 },
          { id: "base_3", label: "7+ pages", oneTime: 600, monthly: 90 }
        ]
      },
      {
        key: "design",
        title: "2. Design Level",
        type: "single",
        items: [
          { id: "design_basic", label: "Basic clean design", oneTime: 0, monthly: 0, included: true },
          { id: "design_custom", label: "Custom styled branding", oneTime: 100, monthly: 15 }
        ]
      },
      {
        key: "contact",
        title: "3. Contact Features",
        type: "single",
        items: [
          { id: "contact_basic", label: "Basic contact info only", oneTime: 0, monthly: 0, included: true },
          { id: "contact_form", label: "Contact form", oneTime: 50, monthly: 10 }
        ]
      },
      {
        key: "booking",
        title: "4. Booking / Scheduling",
        type: "single",
        items: [
          { id: "booking_none", label: "None", oneTime: 0, monthly: 0, included: true },
          { id: "booking_integration", label: "Booking integration", oneTime: 200, monthly: 25 }
        ]
      },
      {
        key: "content",
        title: "5. Content Help",
        type: "single",
        items: [
          { id: "content_client", label: "Client provides all text/images", oneTime: 0, monthly: 0, included: true },
          { id: "content_help", label: "You help write/setup content", oneTime: 100, monthly: 15 }
        ]
      },
      {
        key: "photos",
        title: "6. Photos / Visuals",
        type: "single",
        items: [
          { id: "photos_client", label: "Client provides photos", oneTime: 0, monthly: 0, included: true },
          { id: "photos_stock", label: "You source stock images", oneTime: 50, monthly: 10 }
        ]
      },
      {
        key: "mobile",
        title: "7. Mobile Optimization",
        type: "single",
        items: [
          { id: "mobile_standard", label: "Standard mobile-friendly", oneTime: 0, monthly: 0, included: true },
          { id: "mobile_polish", label: "Extra polish for mobile UX", oneTime: 50, monthly: 10 }
        ]
      },
      {
        key: "seo",
        title: "8. SEO Setup",
        type: "single",
        items: [
          { id: "seo_none", label: "None", oneTime: 0, monthly: 0, included: true },
          { id: "seo_basic", label: "Basic SEO setup", oneTime: 150, monthly: 20 }
        ]
      },
      {
        key: "support",
        title: "9. Ongoing Support",
        type: "single",
        items: [
          { id: "support_none", label: "No ongoing updates", oneTime: 0, monthly: 0, included: true },
          { id: "support_monthly", label: "Monthly updates & small edits", oneTime: 0, monthly: 40 }
        ]
      },
      {
        key: "addons",
        title: "10. Add-Ons",
        type: "multi",
        items: [
          { id: "addon_page", label: "Extra page", oneTime: 100, monthly: 10 },
          { id: "addon_logo", label: "Basic logo help", oneTime: 100, monthly: 0 },
          { id: "addon_rush", label: "Rush job", oneTime: 200, monthly: 0 }
        ]
      }
    ];

    const defaultsSingle = {
      base: "base_1",
      design: "design_basic",
      contact: "contact_basic",
      booking: "booking_none",
      content: "content_client",
      photos: "photos_client",
      mobile: "mobile_standard",
      seo: "seo_none",
      support: "support_none"
    };

    const defaultsMulti = {
      addon_page: false,
      addon_logo: false,
      addon_rush: false
    };

    let singleSelections = { ...defaultsSingle };
    let multiSelections = { ...defaultsMulti };

    function money(n){
      return "$" + Number(n).toLocaleString();
    }

    function pricingText(item){
      if (!item.oneTime && !item.monthly) return "Included";
      if (item.oneTime && item.monthly) return `${money(item.oneTime)} one-time • ${money(item.monthly)}/mo`;
      if (item.oneTime) return `${money(item.oneTime)} one-time`;
      return `${money(item.monthly)}/mo`;
    }

    function renderSections(){
      const container = document.getElementById("sections");
      container.innerHTML = "";

      sections.forEach(section => {
        const sec = document.createElement("div");
        sec.className = "section";

        sec.innerHTML = `
          <div class="section-header">
            <h2>${section.title}</h2>
            <div class="badge">${section.type === "single" ? "Choose one" : "Optional"}</div>
          </div>
        `;

        section.items.forEach(item => {
          const row = document.createElement("div");
          row.className = "option";

          if (section.type === "single") {
            row.innerHTML = `
              <div class="option-left">
                <input type="radio" name="${section.key}" id="${item.id}" ${singleSelections[section.key] === item.id ? "checked" : ""}>
                <label for="${item.id}">
                  <div class="label-title">${item.label}</div>
                  <div class="label-sub">${pricingText(item)}</div>
                </label>
              </div>
            `;

            row.querySelector("input").addEventListener("change", () => {
              singleSelections[section.key] = item.id;
              renderSections();
              updateSummary();
            });

            row.addEventListener("click", (e) => {
              if (e.target.tagName !== "INPUT") {
                singleSelections[section.key] = item.id;
                renderSections();
                updateSummary();
              }
            });
          } else {
            row.innerHTML = `
              <div class="option-left">
                <input type="checkbox" id="${item.id}" ${multiSelections[item.id] ? "checked" : ""}>
                <label for="${item.id}">
                  <div class="label-title">${item.label}</div>
                  <div class="label-sub">${pricingText(item)}</div>
                </label>
              </div>
            `;

            row.querySelector("input").addEventListener("change", (e) => {
              multiSelections[item.id] = e.target.checked;
              updateSummary();
            });

            row.addEventListener("click", (e) => {
              if (e.target.tagName !== "INPUT") {
                multiSelections[item.id] = !multiSelections[item.id];
                renderSections();
                updateSummary();
              }
            });
          }

          sec.appendChild(row);
        });

        container.appendChild(sec);
      });
    }

    function getChosenItems(){
      const chosen = [];

      sections.forEach(section => {
        if (section.type === "single") {
          const item = section.items.find(i => i.id === singleSelections[section.key]);
          if (item) {
            chosen.push({ ...item, section: section.title });
          }
        } else {
          section.items.forEach(item => {
            if (multiSelections[item.id]) {
              chosen.push({ ...item, section: section.title });
            }
          });
        }
      });

      return chosen;
    }

    function updateSummary(){
      const chosen = getChosenItems();
      let oneTime = 0;
      let monthly = 0;

      chosen.forEach(item => {
        oneTime += item.oneTime || 0;
        monthly += item.monthly || 0;
      });

      document.getElementById("oneTimeTotal").textContent = money(oneTime);
      document.getElementById("monthlyTotal").textContent = `${money(monthly)}/mo`;

      const list = document.getElementById("summaryList");
      list.innerHTML = "";

      chosen.forEach(item => {
        const div = document.createElement("div");
        div.className = "summary-item";
        div.innerHTML = `
          <strong>${item.label}</strong>
          <span>${item.section} — ${pricingText(item)}</span>
        `;
        list.appendChild(div);
      });
    }

    function buildSummaryText(){
      const chosen = getChosenItems();
      let oneTime = 0;
      let monthly = 0;
      const lines = ["Website Pricing Summary", ""];

      chosen.forEach(item => {
        oneTime += item.oneTime || 0;
        monthly += item.monthly || 0;
        lines.push(`• ${item.section} — ${item.label} (${pricingText(item)})`);
      });

      lines.push("");
      lines.push(`Total One-Time: ${money(oneTime)}`);
      lines.push(`Total Monthly: ${money(monthly)}/month`);

      return lines.join("\\n");
    }

    function copySummary(){
      navigator.clipboard.writeText(buildSummaryText())
        .then(() => alert("Summary copied."))
        .catch(() => alert("Copy failed on this browser."));
    }

    function resetSelections(){
      singleSelections = { ...defaultsSingle };
      multiSelections = { ...defaultsMulti };
      renderSections();
      updateSummary();
    }

    renderSections();
    updateSummary();

    window.copySummary = copySummary;
    window.resetSelections = resetSelections;
  </script>
</body>
</html>
